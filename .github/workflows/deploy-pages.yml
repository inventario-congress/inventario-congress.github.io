name: Deploy Webapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Validate production HTML entry
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "dist/index.html references /src/main.tsx (dev entry), not production assets."
            exit 1
          fi

          if ! grep -q '/assets/.*\.js' dist/index.html; then
            echo "dist/index.html is missing hashed JS asset references."
            exit 1
          fi

          if ! grep -q '/assets/.*\.css' dist/index.html; then
            echo "dist/index.html is missing hashed CSS asset references."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outcome == 'failure' && steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retrying failed deployment
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "Deployment failed, waiting 60 seconds for GitHub Pages to settle before retry..."
          sleep 60

      - name: Retry Deploy to GitHub Pages
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5