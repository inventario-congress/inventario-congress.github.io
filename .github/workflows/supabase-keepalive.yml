name: Supabase Keepalive

on:
  schedule:
    - cron: '0 3 */1 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Validate configuration
        run: |
          if [[ -z "$SUPABASE_URL" ]]; then
            echo "Repository secret VITE_SUPABASE_URL is required."
            exit 1
          fi

          if [[ -z "$SUPABASE_ANON_KEY" ]]; then
            echo "Repository secret VITE_SUPABASE_PUBLISHABLE_KEY is required."
            exit 1
          fi

      - name: Ping Supabase auth and REST endpoints
        run: |
          auth_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "$SUPABASE_URL/auth/v1/settings")

          rest_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/")

          echo "Auth endpoint returned: $auth_status"
          echo "REST endpoint returned: $rest_status"

          case "$auth_status" in
            2*|3*) ;;
            *)
              echo "Unexpected auth status: $auth_status"
              exit 1
              ;;
          esac

          case "$rest_status" in
            2*|3*|4*) ;;
            *)
              echo "Unexpected REST status: $rest_status"
              exit 1
              ;;
          esac
