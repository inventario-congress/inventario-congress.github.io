name: Supabase Keepalive

on:
  schedule:
    - cron: '0 3 */1 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Validate configuration
        run: |
          if [[ -z "$SUPABASE_URL" ]]; then
            echo "Repository secret VITE_SUPABASE_URL is required."
            exit 1
          fi

          if [[ -z "$SUPABASE_ANON_KEY" ]]; then
            echo "Repository secret VITE_SUPABASE_PUBLISHABLE_KEY is required."
            exit 1
          fi

      - name: Ping Supabase keepalive RPC endpoint
        run: |
          keepalive_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "Content-Type: application/json" \
            --request POST \
            --data '{}' \
            "$SUPABASE_URL/rest/v1/rpc/keepalive_ping")

          echo "Keepalive RPC endpoint returned: $keepalive_status"

          case "$keepalive_status" in
            200) ;;
            *)
              echo "Unexpected keepalive status: $keepalive_status"
              exit 1
              ;;
          esac
