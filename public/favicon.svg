<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    .wave1 { animation: speakerPulse 1.6s ease-in-out infinite; }
    .wave2 { animation: speakerPulse 1.6s ease-in-out 0.3s infinite; }
    .wave3 { animation: speakerPulse 1.6s ease-in-out 0.6s infinite; }
    @keyframes speakerPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
  <!-- Speaker housing -->
  <rect x="2" y="11" width="8" height="10" rx="1.5" fill="#4f8ef7"/>
  <!-- Speaker cone -->
  <path d="M10 9 L18 5 L18 27 L10 23 Z" fill="#4f8ef7"/>
  <!-- Inner cone highlight -->
  <path d="M10 12 L15 9.5 L15 22.5 L10 20 Z" fill="#7fb3ff" opacity="0.5"/>
  <!-- Sound wave 1 (inner) -->
  <path class="wave1" d="M21 12.5 Q23.5 16 21 19.5" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <!-- Sound wave 2 (middle) -->
  <path class="wave2" d="M23.5 10 Q27.5 16 23.5 22" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <!-- Sound wave 3 (outer) -->
  <path class="wave3" d="M26 7.5 Q31.5 16 26 24.5" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
</svg>