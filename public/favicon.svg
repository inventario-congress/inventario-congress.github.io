<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Rich Walnut Wood Texture -->
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D2E0C;stop-opacity:1" />
    </linearGradient>
    <!-- Depth for Speaker Cones -->
    <radialGradient id="cone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Outer Wooden Cabinet -->
  <rect x="64" y="64" width="384" height="384" rx="40" fill="url(#wood)" />

  <!-- Inner Mesh/Grill Area -->
  <rect x="84" y="84" width="344" height="344" rx="20" fill="#222" />

  <!-- Large Bottom Woofer (Bass) -->
  <circle cx="256" cy="300" r="100" fill="url(#cone)" stroke="#444" stroke-width="8" />
  <circle cx="256" cy="300" r="30" fill="#000" />

  <!-- Small Top Tweeter (Highs) -->
  <circle cx="256" cy="150" r="45" fill="url(#cone)" stroke="#444" stroke-width="4" />
  <circle cx="256" cy="150" r="15" fill="#000" />

  <!-- Structural Grill Detail -->
  <line x1="120" y1="100" x2="392" y2="100" stroke="#333" stroke-width="2" />
  <line x1="120" y1="412" x2="392" y2="412" stroke="#333" stroke-width="2" />
</svg>
